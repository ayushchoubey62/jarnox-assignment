<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarnox Stock Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .sidebar { height: 100vh; background-color: #f8f9fa; padding-top: 20px; border-right: 1px solid #dee2e6; }
        .company-item { cursor: pointer; transition: 0.2s; }
        .company-item:hover { background-color: #e9ecef; }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <div class="col-md-3 sidebar d-flex flex-column">
            <h4 class="text-center mb-3">📈 Companies</h4>
            
            <div class="px-3 mb-3">
                <button class="btn btn-warning w-100 fw-bold shadow-sm" data-bs-toggle="modal" data-bs-target="#compareModal">
                    ⚖️ Compare Stocks
                </button>
            </div>

            <div class="list-group flex-grow-1" id="company-list" style="overflow-y: auto;">
                <p class="text-center text-muted">Loading...</p>
            </div>
        </div>

        <div class="col-md-9 p-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h2 id="dashboard-title">Select a company</h2>
                
                <div class="btn-group" role="group" id="filters" style="display: none;">
                    <button type="button" class="btn btn-outline-primary active" onclick="changeTimeframe(30)" id="btn-30">Last 30 Days</button>
                    <button type="button" class="btn btn-outline-primary" onclick="changeTimeframe(90)" id="btn-90">Last 90 Days</button>
                </div>
            </div>
            
            <div class="row mt-3 mb-4" id="summary-cards" style="display: none;">
                <div class="col-md-4">
                    <div class="card text-center shadow-sm border-primary">
                        <div class="card-body">
                            <h6 class="card-title text-muted">Avg Close</h6>
                            <h4 id="avg-close">--</h4>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card text-center shadow-sm border-success">
                        <div class="card-body">
                            <h6 class="card-title text-muted">52-Week High</h6>
                            <h4 id="high-52" class="text-success">--</h4>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card text-center shadow-sm border-danger">
                        <div class="card-body">
                            <h6 class="card-title text-muted">52-Week Low</h6>
                            <h4 id="low-52" class="text-danger">--</h4>
                        </div>
                    </div>
                </div>
            </div>

            <div class="bg-white p-3 rounded shadow-sm border" style="height: 500px;">
                <canvas id="stockChart"></canvas>
            </div>
            
            <p class="text-muted mt-2 text-end" style="font-size: 0.85em;">* Dashed red line indicates AI price trend prediction (Linear Regression)</p>
        </div>
    </div>
</div>

<div class="modal fade" id="compareModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header bg-warning">
        <h5 class="modal-title fw-bold">Compare 1-Year Performance</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
            <label class="form-label">Stock 1</label>
            <select id="compare-stock-1" class="form-select"></select>
        </div>
        <div class="mb-3">
            <label class="form-label">Stock 2</label>
            <select id="compare-stock-2" class="form-select"></select>
        </div>
        <button class="btn btn-primary w-100" onclick="runComparison()">Run Comparison</button>
        
        <div id="compare-results" class="mt-4" style="display: none;">
            <hr>
            <div class="row text-center">
                <div class="col-6 border-end">
                    <h5 id="res-sym-1" class="fw-bold">--</h5>
                    <p class="text-muted mb-0">Current Price: <span id="res-price-1" class="text-dark">--</span></p>
                    <p class="mb-0">1Y Return: <span id="res-ret-1" class="fw-bold">--</span></p>
                </div>
                <div class="col-6">
                    <h5 id="res-sym-2" class="fw-bold">--</h5>
                    <p class="text-muted mb-0">Current Price: <span id="res-price-2" class="text-dark">--</span></p>
                    <p class="mb-0">1Y Return: <span id="res-ret-2" class="fw-bold">--</span></p>
                </div>
            </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    let stockChartInstance = null;
    let currentSymbol = '';
    let currentName = '';
    let currentDays = 30; // Default filter

    async function fetchCompanies() {
        try {
            const response = await fetch('/companies');
            const companies = await response.json();
            const listContainer = document.getElementById('company-list');
            listContainer.innerHTML = ''; 
            
            // Clear dropdowns before populating
            document.getElementById('compare-stock-1').innerHTML = '';
            document.getElementById('compare-stock-2').innerHTML = '';

            companies.forEach(company => {
                // Populate sidebar list
                const button = document.createElement('button');
                button.className = 'list-group-item list-group-item-action company-item fw-bold';
                button.innerHTML = `${company.symbol} <br><small class="text-muted fw-normal">${company.name}</small>`;
                button.onclick = () => {
                    currentSymbol = company.symbol;
                    currentName = company.name;
                    document.getElementById('filters').style.display = 'inline-flex';
                    loadStockData();
                };
                listContainer.appendChild(button);
                
                // Populate comparison dropdowns
                document.getElementById('compare-stock-1').innerHTML += `<option value="${company.symbol}">${company.name} (${company.symbol})</option>`;
                document.getElementById('compare-stock-2').innerHTML += `<option value="${company.symbol}">${company.name} (${company.symbol})</option>`;
            });
        } catch (error) {
            console.error('Error fetching companies:', error);
        }
    }

    // Handles the filter buttons
    function changeTimeframe(days) {
        currentDays = days;
        document.getElementById('btn-30').classList.remove('active');
        document.getElementById('btn-90').classList.remove('active');
        document.getElementById(`btn-${days}`).classList.add('active');
        loadStockData();
    }

    async function loadStockData() {
        if (!currentSymbol) return;
        
        document.getElementById('dashboard-title').innerText = `${currentName} (${currentSymbol})`;
        document.getElementById('summary-cards').style.display = 'flex';

        try {
            // Fetch data passing the days filter parameter
            const dataResponse = await fetch(`/data/${currentSymbol}?days=${currentDays}`);
            const payload = await dataResponse.json();
            
            const historicalData = payload.historical;
            const predictionData = payload.predictions;

            const summaryResponse = await fetch(`/summary/${currentSymbol}`);
            const summaryData = await summaryResponse.json();

            // Using bracket notation for JSON keys that start with a number
            document.getElementById('avg-close').innerText = `₹${summaryData.average_close}`;
            document.getElementById('high-52').innerText = `₹${summaryData['52_week_high'].toFixed(2)}`;
            document.getElementById('low-52').innerText = `₹${summaryData['52_week_low'].toFixed(2)}`;

            // Build Chart Arrays
            const allLabels = [];
            const historicalPrices = [];
            const predictedPrices = [];

            // 1. Map Historical Data
            historicalData.forEach(item => {
                allLabels.push(item.Date.split(' ')[0]);
                historicalPrices.push(item.Close);
                predictedPrices.push(null); // Empty for this dataset
            });

            // To connect the lines visually, add the last historical point to the start of predictions
            const lastHistoricalPrice = historicalPrices[historicalPrices.length - 1];
            predictedPrices[predictedPrices.length - 1] = lastHistoricalPrice;

            // 2. Map Prediction Data
            predictionData.forEach(item => {
                allLabels.push(item.Date);
                historicalPrices.push(null); // Empty for this dataset
                predictedPrices.push(item.Predicted_Close);
            });

            drawChart(allLabels, historicalPrices, predictedPrices, currentSymbol);

        } catch (error) {
            console.error('Error loading stock data:', error);
        }
    }

    function drawChart(labels, historicalData, predictedData, symbol) {
        const ctx = document.getElementById('stockChart').getContext('2d');
        
        if (stockChartInstance) {
            stockChartInstance.destroy();
        }

        stockChartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    {
                        label: 'Historical Close',
                        data: historicalData,
                        borderColor: '#0d6efd',
                        backgroundColor: 'rgba(13, 110, 253, 0.1)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.1
                    },
                    {
                        label: 'AI Prediction Trend',
                        data: predictedData,
                        borderColor: '#dc3545', // Bootstrap red
                        borderWidth: 2,
                        borderDash: [5, 5], // Makes the line dashed!
                        fill: false,
                        tension: 0
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: true } },
                scales: {
                    x: { grid: { display: false } },
                    y: { beginAtZero: false }
                }
            }
        });
    }

    // NEW: Function to run the comparison API
    async function runComparison() {
        const sym1 = document.getElementById('compare-stock-1').value;
        const sym2 = document.getElementById('compare-stock-2').value;

        if (sym1 === sym2) {
            alert("Please select two different stocks to compare.");
            return;
        }

        const resultsDiv = document.getElementById('compare-results');
        resultsDiv.style.display = 'none'; // Hide while loading

        try {
            const response = await fetch(`/compare?symbol1=${sym1}&symbol2=${sym2}`);
            const data = await response.json();

            if (data.error) throw new Error(data.error);

            // Populate Results for Stock 1
            document.getElementById('res-sym-1').innerText = sym1;
            document.getElementById('res-price-1').innerText = `₹${data[sym1].current_price.toFixed(2)}`;
            const ret1 = data[sym1]['1_year_return_percent'];
            const ret1El = document.getElementById('res-ret-1');
            ret1El.innerText = `${ret1 > 0 ? '+' : ''}${ret1}%`;
            ret1El.className = ret1 > 0 ? 'text-success fw-bold' : 'text-danger fw-bold';

            // Populate Results for Stock 2
            document.getElementById('res-sym-2').innerText = sym2;
            document.getElementById('res-price-2').innerText = `₹${data[sym2].current_price.toFixed(2)}`;
            const ret2 = data[sym2]['1_year_return_percent'];
            const ret2El = document.getElementById('res-ret-2');
            ret2El.innerText = `${ret2 > 0 ? '+' : ''}${ret2}%`;
            ret2El.className = ret2 > 0 ? 'text-success fw-bold' : 'text-danger fw-bold';

            resultsDiv.style.display = 'block'; // Show results

        } catch (error) {
            console.error('Error comparing stocks:', error);
            alert("Failed to fetch comparison data.");
        }
    }

    fetchCompanies();
</script>
</body>
</html>
